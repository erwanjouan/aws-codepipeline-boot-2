name: Destroy Fargate Stacks

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ROLE_NAME: GitHubActionsRole
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CICD_ACCOUNT_ID: ${{ secrets.CICD_ACCOUNT_ID }}
  PROD_ACCOUNT_ID: ${{ secrets.PROD_ACCOUNT_ID }}
  AWS_ORGANIZATION_ID: ${{ secrets.AWS_ORGANIZATION_ID }}
  AWS_ORGANIZATION_UNIT_ID: ${{ secrets.AWS_ORGANIZATION_UNIT_ID }}
  AWS_GITHUB_CONNECTION_ARN: ${{ secrets.AWS_GITHUB_CONNECTION_ARN }}
  PROJECT_NAME:  'aws-codepipeline-boot-2'
  DEPLOYMENT_NAME: 'alb-ecs-fargate'
  PROJECT_DEPLOYMENT_NAME: 'aws-codepipeline-boot-2-alb-ecs-fargate'

jobs:
  destroy-fargate-cicd:
    environment: production
    name: Destroy fargate-cicd (CICD account)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (CICD account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.CICD_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Destroy fargate-cicd
        working-directory: infra/cdk
        run: |
          cdk destroy \
            --force \
            fargate-cicd \
            --exclusively

  destroy-fargate-app:
    environment: production
    name: Destroy fargate-app (PROD account)
    runs-on: ubuntu-latest
    needs: destroy-fargate-cicd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (PROD account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.PROD_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Destroy fargate-app
        working-directory: infra/cdk
        run: |
          cdk destroy \
            --force \
            fargate-app \
            --exclusively
