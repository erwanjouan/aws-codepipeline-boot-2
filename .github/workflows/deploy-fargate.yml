name: Deploy alb-ecs-fargate

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ROLE_NAME: GitHubActionsRole

jobs:
  deploy-fargate-app:
    environment: production
    name: Deploy fargate-app (PROD account)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (PROD account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.PROD_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Synth fargate-app
        working-directory: infra/cdk
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CICD_ACCOUNT_ID: ${{ secrets.CICD_ACCOUNT_ID }}
          PROD_ACCOUNT_ID: ${{ secrets.PROD_ACCOUNT_ID }}
          AWS_ORGANIZATION_ID: ${{ secrets.AWS_ORGANIZATION_ID }}
          AWS_ORGANIZATION_UNIT_ID: ${{ secrets.AWS_ORGANIZATION_UNIT_ID }}
        run: |
          cdk synth \
            fargate-app \
            --exclusively
          cat cdk.out/fargate-app.template.json

      - name: Deploy fargate-app
        working-directory: infra/cdk
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CICD_ACCOUNT_ID: ${{ secrets.CICD_ACCOUNT_ID }}
          PROD_ACCOUNT_ID: ${{ secrets.PROD_ACCOUNT_ID }}
          AWS_ORGANIZATION_ID: ${{ secrets.AWS_ORGANIZATION_ID }}
          AWS_ORGANIZATION_UNIT_ID: ${{ secrets.AWS_ORGANIZATION_UNIT_ID }}
        run: |
          cdk deploy \
            --require-approval never \
            fargate-app \
            --exclusively

  deploy-fargate-cicd:
    environment: production
    name: Deploy fargate-cicd (CICD account)
    runs-on: ubuntu-latest
    needs: deploy-fargate-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (CICD account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.CICD_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Synth fargate-cicd
        working-directory: infra/cdk
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CICD_ACCOUNT_ID: ${{ secrets.CICD_ACCOUNT_ID }}
          PROD_ACCOUNT_ID: ${{ secrets.PROD_ACCOUNT_ID }}
          AWS_ORGANIZATION_ID: ${{ secrets.AWS_ORGANIZATION_ID }}
          AWS_ORGANIZATION_UNIT_ID: ${{ secrets.AWS_ORGANIZATION_UNIT_ID }}
          AWS_GITHUB_CONNECTION_ARN: ${{ secrets.AWS_GITHUB_CONNECTION_ARN }}
        run: |
          cdk synth \
            fargate-cicd \
            --exclusively
          cat cdk.out/fargate-cicd.template.json

      - name: Deploy fargate-cicd
        working-directory: infra/cdk
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CICD_ACCOUNT_ID: ${{ secrets.CICD_ACCOUNT_ID }}
          PROD_ACCOUNT_ID: ${{ secrets.PROD_ACCOUNT_ID }}
          AWS_ORGANIZATION_ID: ${{ secrets.AWS_ORGANIZATION_ID }}
          AWS_ORGANIZATION_UNIT_ID: ${{ secrets.AWS_ORGANIZATION_UNIT_ID }}
          AWS_GITHUB_CONNECTION_ARN: ${{ secrets.AWS_GITHUB_CONNECTION_ARN }}
        run: |
          cdk deploy \
            --require-approval never \
            fargate-cicd \
            --exclusively
