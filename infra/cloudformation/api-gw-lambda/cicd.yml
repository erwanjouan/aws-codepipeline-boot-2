AWSTemplateFormatVersion: 2010-09-09
Description: CICD For a Java SpringBoot application deployed with APIGateway/Lambda
Parameters:
  ProjectName:
    Type: String
  DeploymentName:
    Type: String
  ProjectDeploymentName:
    Type: String
  BranchName:
    Type: String
    Default: main
  ArtifactName:
    Type: String
    Default: app.jar
  MavenBuildProfile:
    Type: String
    Default: lambda
  CrossAccountRoleArn:
    Type: String
    Description: ARN of the IAM role that can be assumed by CodePipeline in target account
  CloudFormationRoleArn:
    Type: String
    Description: ARN of IAM role that can be assumed by CloudFormation in target account

Resources:

  ####################
  # S3 Artifact bucket
  ####################

  ArtifactOutputBucket:
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt KmsKey.Arn
    Type: AWS::S3::Bucket

  BucketPolicy:
    Properties:
      Bucket: !Ref ArtifactOutputBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !GetAtt CodePipelineRole.Arn
                - !Ref CrossAccountRoleArn
                - !Ref CloudFormationRoleArn
            Action: 's3:*'
            Resource:
              - !GetAtt ArtifactOutputBucket.Arn
              - !Sub arn:aws:s3:::${ArtifactOutputBucket}/*
    Type: AWS::S3::BucketPolicy

  ############
  # CodeBuild
  ############

  CodeBuildServiceRole:
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: codebuild.amazonaws.com
          Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonS3FullAccess # to avoid circular dependencies
      Policies:
        - PolicyName: allow-to-push-to-S3
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:GetLogEvents
                  - logs:PutLogEvents
                  - logs:PutRetentionPolicy
                Resource: "arn:aws:logs:*"
              - Effect: Allow
                Action: codecommit:GitPull
                Resource: '*'
              - Effect: Allow
                Action: cloudformation:CreateStack
                Resource: '*'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DecryptKey
                  - kms:Encrypt
                  - kms:ReEncrypt*
                  - kms:GenerateDataKey*
                Resource: '*'
    Type: AWS::IAM::Role

  CodeBuildJavaProject:
    Properties:
      Name: !Ref ProjectDeploymentName
      ServiceRole: !Ref CodeBuildServiceRole
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Sub ${DeploymentName}/buildspec.yml
      SourceVersion: main
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:6.0
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Type: PLAINTEXT
            Value: !Ref ProjectName
          - Name: PROJECT_DEPLOYMENT_NAME
            Type: PLAINTEXT
            Value: !Ref ProjectDeploymentName
          - Name: DEPLOYMENT_NAME
            Type: PLAINTEXT
            Value: !Ref DeploymentName
          - Name: AWS_ACCOUNT_ID
            Type: PLAINTEXT
            Value: !Ref AWS::AccountId
          - Name: ARTIFACT_NAME
            Type: PLAINTEXT
            Value: !Ref ArtifactName
          - Name: ARTIFACT_BUCKET
            Type: PLAINTEXT
            Value: !Ref ArtifactOutputBucket
          - Name: MAVEN_BUILD_PROFILE
            Type: PLAINTEXT
            Value: !Ref MavenBuildProfile
      Cache:
        Location: !Sub ${ArtifactOutputBucket}/cache
        Type: S3
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub /aws/codebuild/${ProjectDeploymentName}
    DependsOn: CodeBuildLogGroup
    Type: AWS::CodeBuild::Project

  CodeBuildLogGroup:
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectDeploymentName}
      RetentionInDays: 90
    Type: AWS::Logs::LogGroup

  ###############
  # CodeDeploy
  ###############

  CodeDeployer:
    Properties:
      Description: Provides CodeDeploy service access to expand tags and interact with Auto Scaling on your behalf.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: codedeploy.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForLambda
      Policies:
        - PolicyName: allow-to-access-to-S3
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:List*
                Resource:
                  - !Sub "arn:aws:s3:::${ProjectDeploymentName}"
                  - !Sub "arn:aws:s3:::${ProjectDeploymentName}/*"
      Path: /
    Type: AWS::IAM::Role

  CodeDeployApplication:
    Properties:
      ApplicationName: !Ref ProjectDeploymentName
      ComputePlatform: Lambda
    Type: AWS::CodeDeploy::Application

  # DeploymentConfigName for lambda
  # - CodeDeployDefault.LambdaCanary10Percent5Minutes : Shifts 10 percent of traffic in the first increment. The remaining 90 percent is deployed five minutes later.
  # - CodeDeployDefault.LambdaCanary10Percent10Minutes : Shifts 10 percent of traffic in the first increment. The remaining 90 percent is deployed 10 minutes later.
  # - CodeDeployDefault.LambdaCanary10Percent15Minutes : Shifts 10 percent of traffic in the first increment. The remaining 90 percent is deployed 15 minutes later.
  # - CodeDeployDefault.LambdaCanary10Percent30Minutes : Shifts 10 percent of traffic in the first increment. The remaining 90 percent is deployed 30 minutes later.
  # - CodeDeployDefault.LambdaLinear10PercentEvery1Minute : Shifts 10 percent of traffic every minute until all traffic is shifted.
  # - CodeDeployDefault.LambdaLinear10PercentEvery2Minutes : Shifts 10 percent of traffic every two minutes until all traffic is shifted.
  # - CodeDeployDefault.LambdaLinear10PercentEvery3Minutes : Shifts 10 percent of traffic every three minutes until all traffic is shifted.
  # - CodeDeployDefault.LambdaLinear10PercentEvery10Minutes	: Shifts 10 percent of traffic every 10 minutes until all traffic is shifted.
  # - CodeDeployDefault.LambdaAllAtOnce	: Shifts all traffic to the updated Lambda functions at once.

  CodeDeployDeploymentGroupBlueGreen:
    Properties:
      ApplicationName: !Ref ProjectDeploymentName
      ServiceRoleArn: !GetAtt CodeDeployer.Arn
      DeploymentConfigName: CodeDeployDefault.LambdaAllAtOnce # Overriden by deployment.yml
      DeploymentGroupName: !Sub '${ProjectDeploymentName}-blue-green'
      DeploymentStyle:
        DeploymentType: BLUE_GREEN  # IN_PLACE is only available for EC2/Server
        DeploymentOption: WITH_TRAFFIC_CONTROL
    Type: AWS::CodeDeploy::DeploymentGroup

  ###############
  # CodePipeline
  ###############

  CodePipelineRole:
    # Role for CodePipeline
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - codepipeline.amazonaws.com
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AWSCodePipeline_FullAccess'
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonS3FullAccess'
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess'
      Path: /
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: "*"
                Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - iam:PassRole
              - Resource: "*"
                Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:CreateDeploymentGroup
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
              - Resource: "*"
                Effect: Allow
                Action:
                  - codecommit:*
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeChangeSet
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                Resource: '*'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DecryptKey
                  - kms:Encrypt
                  - kms:ReEncrypt*
                  - kms:GenerateDataKey*
                Resource: '*'
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Ref CrossAccountRoleArn
      RoleName: !Sub code-pipeline-role-${ProjectDeploymentName}
    Type: AWS::IAM::Role

  BuildProjectPipeline:
    # Creating a build pipeline for your project in AWS CodePipeline
    Properties:
      Name: !Sub ${ProjectDeploymentName}-build
      RoleArn: !GetAtt CodePipelineRole.Arn
      RestartExecutionOnUpdate: False
      ArtifactStore:
        Location: !Ref ArtifactOutputBucket
        Type: S3
        EncryptionKey:
          Id: !GetAtt KmsKey.Arn
          Type: KMS
      Stages:
        - Name: SourceStage
          Actions:
            - Name: CodeCommit
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: 1
              OutputArtifacts:
                - Name: source
              Configuration:
                BranchName: !Ref BranchName
                RepositoryName: !Ref ProjectName
                PollForSourceChanges: false
                OutputArtifactFormat: CODEBUILD_CLONE_REF
              Namespace: GitVariables
        - Name: BuildStage
          Actions:
            - Name: CodeBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref CodeBuildJavaProject
              InputArtifacts:
                - Name: source
              OutputArtifacts:
                - Name: infra
        - Name: DeployStage
          Actions:
            - Name: create-changeset
              RoleArn: !Ref CrossAccountRoleArn
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: 1
              InputArtifacts:
                - Name: infra
              Configuration:
                ActionMode: CHANGE_SET_REPLACE
                StackName: !Sub ${ProjectDeploymentName}-deploy
                ChangeSetName: !Sub ${ProjectDeploymentName}-deploy
                Capabilities: CAPABILITY_IAM,CAPABILITY_AUTO_EXPAND
                RoleArn: !Ref CloudFormationRoleArn # the action will be executed with this role
                TemplatePath: "infra::infra.yml"
                ParameterOverrides: !Sub |
                  {
                    "ProjectDeploymentName": "${ProjectDeploymentName}",
                    "ArtifactName": "${ArtifactName}",
                    "SpringProfilesActive": "${DeploymentName}",
                    "ArtifactBucket": "${ArtifactOutputBucket}",
                    "ProjectVersion": "#{GitVariables.CommitId}"
                  }
              RunOrder: 1
            - Name: execute-changeset
              RoleArn: !Ref CrossAccountRoleArn # the pipeline assume this role to execute this action
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Version: 1
                Provider: CloudFormation
              Configuration:
                StackName: !Sub ${ProjectDeploymentName}-deploy
                ChangeSetName: !Sub ${ProjectDeploymentName}-deploy
                ActionMode: CHANGE_SET_EXECUTE
                RoleArn: !Ref CloudFormationRoleArn   # the action will be executed with this role
              RunOrder: 2
    Type: AWS::CodePipeline::Pipeline

  ###############
  # KMS
  ###############

  KmsKey:
    Properties:
      Description: KMS key for CodePipeline artifacts
      Enabled: true
      KeyPolicy:
        Version: 2012-10-17
        Id: key-default-1
        Statement:
          - Sid: Allows admin of the key
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow use of key in another account
            Effect: Allow
            Principal:
              AWS:
                - !Ref CrossAccountRoleArn
                - !Ref CloudFormationRoleArn
                - !GetAtt CodePipelineRole.Arn
            Action:
              - kms:Decrypt
              - kms:DecryptKey
              - kms:Encrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
            Resource: '*'
    Type: AWS::KMS::Key

  KmsAlias:
    Properties:
      AliasName: alias/codepipeline-cross-account
      TargetKeyId: !Ref KmsKey
    Type: AWS::KMS::Alias

  #####################################
  # Starts the pipeline at each commit
  # Pull request validation
  #####################################

  CiCdUtils:
    Properties:
      ProjectName: !Ref ProjectName
      ProjectDeploymentName: !Ref ProjectDeploymentName
      DeploymentName: !Ref DeploymentName
      CodeBuildServiceRole: !Ref CodeBuildServiceRole
      ArtifactOutputBucket: !Ref ArtifactOutputBucket
      BranchName: !Ref BranchName
      ProjectPipeline: !Ref BuildProjectPipeline
    Type: Atomicity::CiCd::Utils::MODULE

  ##########
  # Cleanup
  ##########

  Cleanup:
    Properties:
      ProjectDeploymentName: !Ref ProjectDeploymentName
      ContainerImageRegistries: ''
      BucketNames: !Ref ArtifactOutputBucket
    Type: Atomicity::Cleanup::Lambda::MODULE

Outputs:
  ArtifactOutputBucket:
    Value: !GetAtt ArtifactOutputBucket.RegionalDomainName
