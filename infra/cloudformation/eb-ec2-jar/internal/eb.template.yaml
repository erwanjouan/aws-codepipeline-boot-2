AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Elastic Beanstalk environment (Name: ''aws-codepipeline-boot-eb-ec2-jar''  Id:
  ''e-pzf3dbpq6v'')'
Mappings:
  AWSEBAWSRegionArch2AMI:
    eu-west-1:
      gpu: ''
      graphics: ''
      hvm: ami-08206cef7eeff519c
      pv: ''
  AWSEBAWSRegionArch2AMIARM:
    eu-west-1:
      gpu: ''
      graphics: ''
      hvm: ami-0ddf72cb180f0339c
      pv: ''
  AWSEBAWSRegionArch2AMIBase:
    eu-west-1:
      gpu: ''
      graphics: ''
      hvm: ami-057b6e529186a8233
      pv: ''
  AWSEBAWSRegionArch2AMIBaseARM:
    eu-west-1:
      gpu: ''
      graphics: ''
      hvm: ami-0355efc62b49035df
      pv: ''
  AWSEBOptions:
    options:
      AWSEBHealthdEndpoint: https://elasticbeanstalk-health.eu-west-1.amazonaws.com
      AWSEBHealthdGroupId: 2891332e-e839-43e0-8ba2-eaa77041d114
      CloudConfigOptions: "cloud_final_modules:\n - [scripts-user, always]"
      CommandBasedLeaderElection: 'true'
      DefaultSSHPort: '22'
      DefaultsScript: /opt/elasticbeanstalk/config/private/containercommandsupport/container-defaults.sh
      EBSNSTopicArn: ''
      EmbeddedConfigsetsEnabled: 'true'
      EnvironmentType: LoadBalanced
      FastVersionDeployment: 'true'
      HaltStartupCommandsOnFailure: 'true'
      HealthdProxyLogLocation: ''
      LaunchType: Migration
      LeaderTestScript: /opt/elasticbeanstalk/config/private/containercommandsupport/leader-test.sh
      OptionDefinitionOverrideEnabled: true
      ProxyServer: nginx
      ServiceRole: AWSServiceRoleForElasticBeanstalk
      UserDataScript: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/lib/UserDataScript.sh
      downloadSourceBundleScriptLocation:
      - https://elasticbeanstalk-env-resources-eu-west-1.s3.amazonaws.com/eb_patching_resources/download_source_bundle.py
      ebpatchscripturl:
      - https://s3-eu-west-1.amazonaws.com/elasticbeanstalk-env-resources-eu-west-1/eb_patching_resources/patch_instance.py
      nodeploymentOnStartup: 'true'
      platformAssetsUrl: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159
  ContainerMeta:
    AMIMeta:
      AMIName: al2023-ami-2023.1.20230825.0-kernel-6.1-x86_64
      AMIVersion: 2023.1.20230825
      Owner: amazon
      RepoReleaseVersion: '2023.1'
  ContainerMetaARM:
    AMIMeta:
      AMIName: al2023-ami-2023.1.20230825.0-kernel-6.1-arm64
      AMIVersion: 2023.1.20230825
      Owner: amazon
      RepoReleaseVersion: '2023.1'
  EnvironmentInfoTasks:
    bundle:
      AutoClean: 'true'
      CommandName: CMD-BundleLogs
      LocationPrefix: resources/environments/logs/bundle/
    publish:
      LocationPrefix: resources/environments/logs/publish/
    systemtail:
      AutoClean: 'true'
      CommandName: CMD-SystemTailLogs
      LocationPrefix: resources/environments/logs/systemtail/
    tail:
      AutoClean: 'true'
      CommandName: CMD-TailLogs
      LocationPrefix: resources/environments/logs/tail/
Outputs: {}
Parameters:
  AWSEBAgentId:
    Default: ''
    NoEcho: 'true'
    Type: String
  AWSEBEnvironmentBucket:
    NoEcho: 'true'
    Type: String
  AWSEBEnvironmentId:
    NoEcho: 'true'
    Type: String
  AWSEBEnvironmentName:
    NoEcho: 'true'
    Type: String
  AWSEBReferrerId:
    Default: ''
    NoEcho: 'true'
    Type: String
  AppSource:
    Default: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/sampleapp/EBSampleApp-Corretto.zip
    Description: The url of the application source.
    NoEcho: 'true'
    Type: String
  EnvironmentVariables:
    Default: M2_HOME=/usr/local/apache-maven,M2=/usr/local/apache-maven/bin,GRADLE_HOME=/usr/local/gradle
    Description: Container environment variables.
    NoEcho: 'true'
    Type: CommaDelimitedList
  HooksPkgUrl:
    Default: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/lib/hooks.tar.gz
    Description: Hooks package URL
    NoEcho: 'true'
    Type: String
  InstancePort:
    Default: '80'
    Description: Listen Port
    NoEcho: 'true'
    Type: String
  InstanceType:
    ConstraintDescription: must be a valid EC2 instance type.
    Description: WebServer EC2 instance type
    NoEcho: 'true'
    Type: String
  InstanceTypeFamily:
    Description: WebServer EC2 instance type family
    NoEcho: 'true'
    Type: String
  LogPublicationControl:
    AllowedValues:
    - 'true'
    - 'false'
    ConstraintDescription: must be Boolean.
    Default: 'false'
    Description: If true customer service logs will be published to S3.
    NoEcho: 'true'
    Type: String
  ProxyStaticFiles:
    Default: ''
    Description: A mapping from virtual path to physical path.
    NoEcho: 'true'
    Type: CommaDelimitedList
  XRayEnabled:
    Default: 'false'
    Description: Enables AWS X-Ray for your environment.
    NoEcho: 'true'
    Type: String
Resources:
  AWSEBAutoScalingGroup:
    DependsOn: AWSEBBeanstalkMetadata
    Metadata:
      AWS::CloudFormation::Init:
        AWSEBBaseConfig:
          commands:
            clearbackupfiles:
              command: cd /opt/elasticbeanstalk/config && find . -name "*.bak" -type
                f -delete
          files:
            /opt/elasticbeanstalk/config/ebenvinfo/envbucket:
              content:
                Ref: AWSEBEnvironmentBucket
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/ebenvinfo/envid:
              content:
                Ref: AWSEBEnvironmentId
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/ebenvinfo/launchwaithandle:
              content:
                Ref: AWSEBInstanceLaunchWaitHandle
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/ebenvinfo/region:
              content:
                Ref: AWS::Region
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/ebenvinfo/resource:
              content: AWSEBAutoScalingGroup
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/healthd/healthdendpoint:
              content:
                Fn::Join:
                - ''
                - - '{'
                  - '"healthd_endpoint":'
                  - '"'
                  - Fn::FindInMap:
                    - AWSEBOptions
                    - options
                    - AWSEBHealthdEndpoint
                  - '"'
                  - '}'
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/healthd/healthdgroupid:
              content:
                Fn::Join:
                - ''
                - - '{'
                  - '"groupId":'
                  - '"'
                  - Fn::FindInMap:
                    - AWSEBOptions
                    - options
                    - AWSEBHealthdGroupId
                  - '"'
                  - '}'
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/platformassetsurl:
              content:
                Fn::FindInMap:
                - AWSEBOptions
                - options
                - platformAssetsUrl
              group: root
              mode: '000440'
              owner: root
            /opt/elasticbeanstalk/config/platformconfig/eventmessages.txt:
              group: root
              mode: '000440'
              owner: root
              source: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/configs/eventmessages.txt
            /opt/elasticbeanstalk/config/platformconfig/generalconfig.json:
              group: root
              mode: '000440'
              owner: root
              source: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/configs/generalconfig.json
            /opt/elasticbeanstalk/config/platformconfig/guid.json:
              group: root
              mode: '000440'
              owner: root
              source: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/configs/guid.json
            /opt/elasticbeanstalk/config/platformconfig/packages.json:
              group: root
              mode: '000440'
              owner: root
              source: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/configs/packages.json
            /opt/elasticbeanstalk/config/platformconfig/platformconfig.json:
              group: root
              mode: '000440'
              owner: root
              source: https://elasticbeanstalk-platform-assets-eu-west-1.s3.eu-west-1.amazonaws.com/stalks/eb_corretto17_amazon_linux_2023_1.0.100.0_20230828210159/configs/platformconfig.json
        AWSEBCfnHupEndpointOverride:
          commands:
            clearbackupfiles:
              command: rm -f /etc/cfn/endpoints-override.json.bak*
          files:
            /etc/cfn/endpoints-override.json:
              content:
                Fn::Join:
                - ''
                - - '{'
                  - '

                    '
                  - '  "Services": {'
                  - '

                    '
                  - '    "AmazonS3": {'
                  - '

                    '
                  - '      "Endpoints": ['
                  - '

                    '
                  - '          { "Region": "us-east-1", "Hostname": "s3.amazonaws.com",
                    "Default": true },'
                  - '

                    '
                  - '          { "Region": "us-east-1", "Hostname": "s3-external-1.amazonaws.com"
                    },'
                  - '

                    '
                  - '          { "Region": "us-east-1", "Hostname": "s3-external-2.amazonaws.com"
                    }'
                  - '

                    '
                  - '      ]'
                  - '

                    '
                  - '    },'
                  - '

                    '
                  - '    "AmazonSQS": {'
                  - '

                    '
                  - '      "Endpoints": ['
                  - '

                    '
                  - '      ]'
                  - '

                    '
                  - '    }'
                  - '

                    '
                  - '  }'
                  - '

                    '
                  - '}'
                  - '

                    '
              group: root
              mode: '000644'
              owner: root
        Hook-PreAppDeploy:
          commands:
            hooks:
              command: echo place holder
        InfoTask-BundleLogs:
          commands:
            bundlelogs:
              command:
                Fn::Join:
                - ''
                - - 'bundleLogs.py --conf-path ''/opt/elasticbeanstalk/tasks/bundlelogs.d/*''
                    --location-prefix '
                  - Fn::FindInMap:
                    - EnvironmentInfoTasks
                    - bundle
                    - LocationPrefix
        InfoTask-SystemTailLogs:
          commands:
            systemtaillogs:
              command:
                Fn::Join:
                - ''
                - - 'tailLogs.py --conf-path ''/opt/elasticbeanstalk/tasks/systemtaillogs.d/*''
                    --location-prefix '
                  - Fn::FindInMap:
                    - EnvironmentInfoTasks
                    - systemtail
                    - LocationPrefix
        InfoTask-TailLogs:
          commands:
            taillogs:
              command:
                Fn::Join:
                - ''
                - - 'tailLogs.py --concatenate --conf-path ''/opt/elasticbeanstalk/tasks/taillogs.d/*''
                    --location-prefix '
                  - Fn::FindInMap:
                    - EnvironmentInfoTasks
                    - tail
                    - LocationPrefix
        Infra-InstallContainerHooksPkg:
          commands:
            00mkdir:
              command: mkdir -p /opt/elasticbeanstalk
            01download_container_hooks:
              command:
                Fn::Join:
                - ''
                - - curl -sS --retry 3 '
                  - Ref: HooksPkgUrl
                  - ''' -o /tmp/hooks.tar.gz'
            02install_container_hooks:
              command: tar zxf /tmp/hooks.tar.gz --no-same-owner --no-same-permission
                -C /opt/elasticbeanstalk
            03cleanup:
              command: rm -f /tmp/hooks.tar.gz
        Infra-PatchInstance:
          commands:
            01executepatch:
              command: /opt/elasticbeanstalk/bin/patch_instance
          files:
            /opt/elasticbeanstalk/bin/patch_instance:
              group: root
              mode: '000750'
              owner: root
              source:
                Fn::Select:
                - 0
                - Fn::FindInMap:
                  - AWSEBOptions
                  - options
                  - ebpatchscripturl
        Infra-WriteApplication1:
          commands:
            01mkdir:
              command: rm -rf /opt/elasticbeanstalk/deploy/appsource/; mkdir -p /opt/elasticbeanstalk/deploy/appsource/
        Infra-WriteApplication2:
          commands:
            01downloadVersion:
              command: /opt/elasticbeanstalk/bin/download_source_bundle
            02deleteVersionDownloadScriptFile:
              command: rm /opt/elasticbeanstalk/bin/download_source_bundle
          files:
            /opt/elasticbeanstalk/bin/download_source_bundle:
              group: root
              mode: '000750'
              owner: root
              source:
                Fn::Select:
                - 0
                - Fn::FindInMap:
                  - AWSEBOptions
                  - options
                  - downloadSourceBundleScriptLocation
        Infra-WriteBundleLogsConf:
          files:
            /opt/elasticbeanstalk/tasks/bundlelogs.d/cfn-system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/cfn-hup*
                  - /var/log/cfn-init*
                  - /var/log/cfn-wire*
                  - ''
              mode: '000644'
            /opt/elasticbeanstalk/tasks/bundlelogs.d/cloud-init-system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/cloud-init*
                  - ''
              mode: '000644'
            /opt/elasticbeanstalk/tasks/bundlelogs.d/eb-system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/eb-cfn-init*
                  - /var/log/eb-tools*
                  - /var/log/eb-publish-logs*
                  - /var/log/eb-commandprocessor*
                  - /var/log/eb-activity*
                  - ''
              mode: '000644'
            /opt/elasticbeanstalk/tasks/bundlelogs.d/eb-version-deployment.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/eb-version-deployment.log
                  - ''
            /opt/elasticbeanstalk/tasks/bundlelogs.d/system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/cron
                  - /var/log/messages
                  - /var/log/yum.log
                  - ''
              mode: '000644'
        Infra-WritePublishLogsConf:
          files: {}
        Infra-WritePublishLogsCron:
          files:
            /etc/cron.d/publishlogs:
              content:
                Fn::Join:
                - ''
                - - SHELL=/bin/bash
                  - '

                    '
                  - PATH=/sbin:/bin:/usr/sbin:/usr/bin
                  - '

                    '
                  - MAILTO=""
                  - '

                    '
                  - HOME=/
                  - '

                    '
                  - '10,30,50 * * * * root '
                  - 'publishLogs.py --de-dupe --conf-path ''/opt/elasticbeanstalk/tasks/publishlogs.d/*''
                    --location-prefix '
                  - Fn::FindInMap:
                    - EnvironmentInfoTasks
                    - publish
                    - LocationPrefix
                  - ' --num-concurrent 2'
                  - '

                    '
                  - '05,25,45 * * * * root '
                  - clearStaleLogPublishingRecords.py
                  - '

                    '
              mode: '000644'
        Infra-WriteSystemTailLogsConf:
          files:
            /opt/elasticbeanstalk/tasks/systemtaillogs.d/cfn-system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/cfn-hup.log
                  - /var/log/cfn-init.log
                  - ''
              mode: '000644'
            /opt/elasticbeanstalk/tasks/systemtaillogs.d/cloud-init-system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/cloud-init.log
                  - ''
              mode: '000644'
            /opt/elasticbeanstalk/tasks/systemtaillogs.d/eb-system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/eb-cfn-init.log
                  - /var/log/eb-tools.log
                  - /var/log/eb-publish-logs.log
                  - /var/log/eb-commandprocessor.log
                  - /var/log/eb-activity.log
                  - ''
              mode: '000644'
            /opt/elasticbeanstalk/tasks/systemtaillogs.d/eb-version-deployment.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/eb-version-deployment.log
                  - ''
            /opt/elasticbeanstalk/tasks/systemtaillogs.d/system.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/cron
                  - /var/log/messages
                  - /var/log/yum.log
                  - ''
              mode: '000644'
        Infra-WriteTailLogsConf:
          files:
            /opt/elasticbeanstalk/tasks/taillogs.d/eb-activity.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/eb-commandprocessor.log
                  - /var/log/eb-activity.log
                  - ''
              mode: '000644'
            /opt/elasticbeanstalk/tasks/taillogs.d/eb-version-deployment.conf:
              content:
                Fn::Join:
                - '

                  '
                - - /var/log/eb-version-deployment.log
                  - ''
        configSets:
          Hook-PreAppDeploy:
          - Hook-PreAppDeploy
          InfoTask-BundleLogs:
          - InfoTask-BundleLogs
          InfoTask-SystemTailLogs:
          - InfoTask-SystemTailLogs
          InfoTask-TailLogs:
          - InfoTask-TailLogs
          Infra-EmbeddedPostBuild:
          - postbuild_0_aws_codepipeline_boot_eb_ec2_jar
          - postbuild_1_aws_codepipeline_boot_eb_ec2_jar
          Infra-EmbeddedPreBuild:
          - prebuild_0_aws_codepipeline_boot_eb_ec2_jar
          - prebuild_1_aws_codepipeline_boot_eb_ec2_jar
          Infra-WriteApplication1:
          - Infra-WriteApplication1
          Infra-WriteApplication2:
          - Infra-WriteApplication2
          Infra-WriteBundleLogsConf:
          - Infra-WriteBundleLogsConf
          Infra-WritePublishLogsConf:
          - Infra-WritePublishLogsConf
          Infra-WritePublishLogsCron:
          - Infra-WritePublishLogsCron
          Infra-WriteSystemTailLogsConf:
          - Infra-WriteSystemTailLogsConf
          Infra-WriteTailLogsConf:
          - Infra-WriteTailLogsConf
          _AppInstall:
          - prebuild_0_aws_codepipeline_boot_eb_ec2_jar
          - prebuild_1_aws_codepipeline_boot_eb_ec2_jar
          - Hook-PreAppDeploy
          - postbuild_0_aws_codepipeline_boot_eb_ec2_jar
          - postbuild_1_aws_codepipeline_boot_eb_ec2_jar
          _Infra-PatchInstance:
          - Infra-PatchInstance
          _OnInstanceBoot:
          - AWSEBBaseConfig
          - AWSEBCfnHupEndpointOverride
          _OnInstanceReboot:
          - AWSEBBaseConfig
        postbuild_0_aws_codepipeline_boot_eb_ec2_jar:
          commands:
            start_cloudwatch_agent:
              command: /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl
                -a fetch-config -m ec2 -s -c file:/opt/aws/amazon-cloudwatch-agent/bin/config.json
              defaults:
                Fn::FindInMap:
                - AWSEBOptions
                - options
                - DefaultsScript
        postbuild_1_aws_codepipeline_boot_eb_ec2_jar:
          commands:
            command_triggered_by_leader_only:
              command: echo I_am_the_leader
              defaults:
                Fn::FindInMap:
                - AWSEBOptions
                - options
                - DefaultsScript
              test:
                Fn::FindInMap:
                - AWSEBOptions
                - options
                - LeaderTestScript
        prebuild_0_aws_codepipeline_boot_eb_ec2_jar:
          files:
            /opt/aws/amazon-cloudwatch-agent/bin/config.json:
              content: "{\n  \"agent\": {\n    \"metrics_collection_interval\": 60,\n\
                \    \"run_as_user\": \"root\"\n  },\n  \"metrics\": {\n    \"namespace\"\
                : \"System/Linux\",\n    \"append_dimensions\": {\n      \"AutoScalingGroupName\"\
                : \"${aws:AutoScalingGroupName}\"\n    },\n    \"metrics_collected\"\
                : {\n      \"mem\": {\n        \"measurement\": [\n          \"mem_used_percent\"\
                \n        ]\n      }\n    }\n  }\n}\n"
              group: root
              mode: '000600'
              owner: root
        prebuild_1_aws_codepipeline_boot_eb_ec2_jar:
          commands:
            installing_ssm_agent:
              command: yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
              test: '[ ! -e /usr/bin/amazon-ssm-agent ]'
            testing_java:
              command: java --version
            testing_maven:
              command: mvn --version
      AWS::ElasticBeanstalk::Ext:
        AvailabilityZoneCount: Any
        InstanceSignalURL:
          Ref: AWSEBInstanceLaunchWaitHandle
        _API:
          _Commands:
            CMD-AppDeploy:
              _RunStaged: 'true'
              _Stages:
                01_pre: []
                02_enact: []
            CMD-BundleLogs:
              _Stages:
                01_enact:
                - InfoTask-BundleLogs
            CMD-ConfigDeploy:
              _RunStaged: 'true'
              _Stages:
                01_pre: []
                02_enact: []
            CMD-PatchInstance:
              _Stages:
                01_enact:
                - _Infra-PatchInstance
            CMD-RestartAppServer:
              _RunStaged: 'false'
              _Stages:
                01_enact: []
                02_enact: []
            CMD-Startup:
              _RunStaged: 'true'
              _Stages:
                01_pre: []
                02_enact: []
            CMD-SystemTailLogs:
              _Stages:
                01_enact:
                - InfoTask-SystemTailLogs
            CMD-TailLogs:
              _Stages:
                01_enact:
                - InfoTask-TailLogs
        _AppSourceUrlFileContent:
          url:
            Ref: AppSource
        _ContainerConfigFileContent:
          commands:
            CMD-AppDeploy:
              refresh_manifest: true
              stages:
              - actions:
                - name: DownloadSourceBundle
                  type: infra
                  value: /opt/elasticbeanstalk/bin/download-source-bundle
                - name: EbExtensionPreBuild
                  type: infra
                  value: infra-embedded_prebuild.rb
                - name: AppDeployPreHook
                  type: hook
                  value: appdeploy/pre
                - name: EbExtensionPostBuild
                  type: infra
                  value: infra-embedded_postbuild.rb
                - name: InfraCleanEbextension
                  type: infra
                  value: infra-clean_ebextensions_dir.rb
                name: AppDeployStage0
              - actions:
                - name: AppDeployEnactHook
                  type: hook
                  value: appdeploy/enact
                - name: AppDeployPostHook
                  type: hook
                  value: appdeploy/post
                name: AppDeployStage1
            CMD-BundleLogs:
              persistent_configuration: true
              stages:
              - actions:
                - name: BundleLogs
                  type: sh
                  value: bundleLogs.py --conf-path '/opt/elasticbeanstalk/tasks/bundlelogs.d/*'
                    --location-prefix 'resources/environments/logs/bundle/'
                name: BundleLogs
            CMD-ConfigDeploy:
              refresh_manifest: true
              stages:
              - actions:
                - name: ConfigDeployPreHook
                  type: hook
                  value: configdeploy/pre
                name: ConfigDeployStage0
              - actions:
                - name: ConfigDeployEnactHook
                  type: hook
                  value: configdeploy/enact
                - name: ConfigDeployPostHook
                  type: hook
                  value: configdeploy/post
                name: ConfigDeployStage1
            CMD-ImmutableDeploymentFlip:
              persistent_configuration: true
              stages:
              - actions:
                - name: FlipCommandRegistration
                  type: infra
                  value: infra-reregister-cfn-hup.rb
                name: ImmutableDeploymentFlip
