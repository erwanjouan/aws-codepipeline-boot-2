AWSTemplateFormatVersion: 2010-09-09
Description: A Java SpringBoot application deployed on ECS Fargate behind an ALB
Parameters:
  ProjectDeploymentName:
    Type: String
  DeploymentName:
    Type: String
  ProjectVersion:
    Type: String
  ApplicationPort:
    Type: String
    Default: 8080
  DesiredCount:
    Type: String
    Default: 2
  AlbPort:
    Type: String
    Default: 80
  ContainerImageRepositoryUrl:
    Type: String
  AlbAccessLogsEnabled:
    Type: String
    Default: true

Resources:

  Network:
    Type: Atomicity::Vpc::Internet::MODULE

  ##########################
  # ALB
  ##########################

  Alb:
    Properties:
      ApplicationPort: !Ref ApplicationPort
      AlbPort: !Ref AlbPort
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PublicSubnet1: !Ref NetworkPublicSubnet1
      # noinspection YamlUnresolvedReferences
      PublicSubnet2: !Ref NetworkPublicSubnet2
      HealthCheckPath: /actuator/health
      TargetType: ip
      AccessLogsEnabled: !Ref AlbAccessLogsEnabled
      ProjectDeploymentName: !Ref ProjectDeploymentName
      EnableSecondaryTargetGroup: true
    # noinspection YamlUnresolvedReferences
    DependsOn: NetworkGatewayToInternet
    Type: Atomicity::Alb::Resources::MODULE

  ##########################
  # ECS
  ##########################

  ECSExecutionRole:
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          Effect: Allow
          Principal:
            Service: [ ecs-tasks.amazonaws.com ]
          Action: [ sts:AssumeRole ]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
    Type: AWS::IAM::Role

  ECSTaskRole:
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: ''
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: !Sub ${ProjectDeploymentName}-ecs-task-info
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: "*"
                Effect: Allow
                Action:
                  - ecs:DescribeTasks
                  - ecs:ListTasks
        - PolicyName: !Sub ${ProjectDeploymentName}-ecs-service-info
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${ProjectDeploymentName}/${ProjectDeploymentName}"
                Effect: Allow
                Action:
                  - ecs:ListServices
                  - ecs:DescribeServices
    Type: AWS::IAM::Role

  EcsFargateSecurityGroup:
    Properties:
      GroupDescription: allow access to ECS from ALB
      # noinspection YamlUnresolvedReferences
      VpcId: !Ref NetworkVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApplicationPort
          ToPort: !Ref ApplicationPort
          # noinspection YamlUnresolvedReferences
          SourceSecurityGroupId: !Ref AlbSecurityGroup
    Type: AWS::EC2::SecurityGroup

  EcsFargateLogGroup:
    Properties:
      LogGroupName: !Sub /ecs/fargate/${ProjectDeploymentName}
      RetentionInDays: 90
    Type: AWS::Logs::LogGroup

  EcsFargateTaskDefinition:
    # ECS Task Definition
    Properties:
      NetworkMode: awsvpc
      Family: !Ref ProjectDeploymentName
      Cpu: 512
      Memory: 1024
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn # Fargate requires task definition to have execution role ARN to support ECR images
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      RequiresCompatibilities:
        - FARGATE
      ContainerDefinitions:
        - Name: !Ref ProjectDeploymentName
          # latest tag on image allows CodeDeploy to perform the real deployment
          Image: !Sub ${ContainerImageRepositoryUrl}:latest
          Environment:
            - Name: SERVER_PORT
              Value: !Ref ApplicationPort
            - Name: SPRING_PROFILES_ACTIVE
              Value: !Ref DeploymentName
            - Name: PROJECT_DEPLOYMENT_NAME
              Value: !Ref ProjectDeploymentName
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-region: !Ref AWS::Region
              awslogs-group: !Ref EcsFargateLogGroup
              awslogs-stream-prefix: oam-ecs
          PortMappings:
            - ContainerPort: !Ref ApplicationPort
    Type: AWS::ECS::TaskDefinition

  EcsFargateCluster:
    # ECS Cluster
    Properties:
      ClusterName: !Ref ProjectDeploymentName
    Type: AWS::ECS::Cluster

  EcsFargateService:
    # ECS Service
    Properties:
      ServiceName: !Ref ProjectDeploymentName
      Cluster: !Ref EcsFargateCluster
      LaunchType: FARGATE
      DeploymentController:
        Type: CODE_DEPLOY
      DesiredCount: !Ref DesiredCount
      LoadBalancers:
        - # noinspection YamlUnresolvedReferences
          TargetGroupArn: !Ref AlbTargetGroup # loadBalancerName and targetGroupArn cannot both be specified. You must specify either a loadBalancerName or a targetGroupArn.
          ContainerPort: !Ref ApplicationPort
          ContainerName: !Ref ProjectDeploymentName
      NetworkConfiguration:
        AwsvpcConfiguration:
          #AssignPublicIp: ENABLED # unless a NAT / Route needs to be opened to ECR
          SecurityGroups:
            - !Ref EcsFargateSecurityGroup
          # noinspection YamlUnresolvedReferences
          Subnets: [ !Ref NetworkPrivateSubnet1, !Ref NetworkPrivateSubnet2 ]
      TaskDefinition: !Ref 'EcsFargateTaskDefinition'
    # noinspection YamlUnresolvedReferences
    DependsOn:
      - AlbListener # unless "The target group does not have an associated load balancer"
      - EcsFargateLogGroup
    Type: AWS::ECS::Service

  ###############
  # CodeDeploy
  ###############

  CodeDeployer:
    Properties:
      Description: Provides CodeDeploy service access
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: codedeploy.amazonaws.com
          Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectDeploymentName}-ecs-task-info
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: "*"
                Effect: Allow
                Action:
                  - ecs:DescribeTasks
                  - ecs:ListTasks
        - PolicyName: !Sub ${ProjectDeploymentName}-ecs-service-info
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${ProjectDeploymentName}/${ProjectDeploymentName}"
                Effect: Allow
                Action:
                  - ecs:ListServices
                  - ecs:DescribeServices
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Path: /
    Type: AWS::IAM::Role

  CodeDeployApplication:
    Properties:
      ApplicationName: !Ref ProjectDeploymentName
      ComputePlatform: ECS
    Type: AWS::CodeDeploy::Application

  CodeDeployDeploymentGroup:
    Properties:
      ApplicationName: !Ref ProjectDeploymentName
      ServiceRoleArn: !GetAtt CodeDeployer.Arn
      DeploymentGroupName: !Ref ProjectDeploymentName
      AutoRollbackConfiguration:
        Enabled: True
        Events:
          - DEPLOYMENT_FAILURE
      BlueGreenDeploymentConfiguration:
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
          WaitTimeInMinutes: 0
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
      DeploymentStyle:
        DeploymentOption: WITH_TRAFFIC_CONTROL
        DeploymentType: BLUE_GREEN
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - TargetGroups:
              - # noinspection YamlUnresolvedReferences
                Name: !GetAtt AlbTargetGroup.TargetGroupName
              - # noinspection YamlUnresolvedReferences
                Name: !GetAtt AlbTargetGroupSecondary.TargetGroupName
            ProdTrafficRoute:
              # noinspection YamlUnresolvedReferences
              ListenerArns:
                - !Ref AlbListener
      ECSServices:
        - ClusterName: !Ref ProjectDeploymentName
          ServiceName: !Ref ProjectDeploymentName
    Type: AWS::CodeDeploy::DeploymentGroup

  ###############
  # VPC Endpoints
  ###############

  VpcEndPoints:
    Properties:
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PrivateSubnet1: !Ref NetworkPrivateSubnet1
      # noinspection YamlUnresolvedReferences
      PrivateSubnet2: !Ref NetworkPrivateSubnet2
    Type: Atomicity::Vpc::Endpoints::MODULE

Outputs:
  WatchServiceEndpoint:
    Value: !Sub
      - "http://${LbDNSName}/${DeploymentName}"
      - # noinspection YamlUnresolvedReferences
        LbDNSName: !GetAtt AlbInstance.DNSName