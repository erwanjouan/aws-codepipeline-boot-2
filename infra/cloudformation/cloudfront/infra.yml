AWSTemplateFormatVersion: 2010-09-09
Description: A Java SpringBoot application deployed on EC2 with replacing update behind cloudfront
Parameters:
  ProjectDeploymentName:
    Type: String
  DeploymentName:
    Type: String
  ApplicationPort:
    Type: String
    Default: 8080
  AlbPort:
    Type: String
    Default: 80
  ASGMinSize:
    Type: Number
    Default: 2
  ASGMaxSize:
    Type: Number
    Default: 4
  ProjectVersion:
    Type: String
  ArtifactName:
    Type: String
  ArtifactDomainName:
    Type: String
  RepositoryName:
    Type: String
  ProjectName:
    Type: String
  AlbAccessLogsEnabled:
    Type: String
    Default: false
  LatestAmiId:
    Type: String
  Architecture:
    Type: String
  CiCdAccountId:
    Type: String

Mappings:
  Architectures:
    x86:
      InstanceType: t2.small
    arm64:
      InstanceType: t4g.small

Resources:

  Network:
    Type: Atomicity::Vpc::Internet::MODULE

  ##########################
  # ALB
  ##########################

  Alb:
    Properties:
      ApplicationPort: !Ref ApplicationPort
      AlbPort: !Ref AlbPort
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PublicSubnet1: !Ref NetworkPublicSubnet1
      # noinspection YamlUnresolvedReferences
      PublicSubnet2: !Ref NetworkPublicSubnet2
      HealthCheckPath: /actuator/health
      AccessLogsEnabled: !Ref AlbAccessLogsEnabled
      ProjectDeploymentName: !Ref ProjectDeploymentName
    # noinspection YamlUnresolvedReferences
    DependsOn: NetworkGatewayToInternet
    Type: Atomicity::Alb::Resources::MODULE

  ###################
  # AutoScalingGroup
  ###################

  AutoScalingGroup:
    Properties:
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      MinSize:
        Ref: ASGMinSize
      MaxSize:
        Ref: ASGMaxSize
      LaunchTemplate:
        LaunchTemplateId: !Ref Ec2LaunchTemplate
        Version: !GetAtt Ec2LaunchTemplate.LatestVersionNumber
      # noinspection YamlUnresolvedReferences
      VPCZoneIdentifier: [ !Ref NetworkPrivateSubnet1, !Ref NetworkPrivateSubnet2 ]
      TargetGroupARNs:
        - # noinspection YamlUnresolvedReferences
          Ref: AlbTargetGroup
      Tags:
        - Key: ProjectDeploymentName
          Value: !Ref ProjectDeploymentName
          PropagateAtLaunch: true
        - Key: Name
          Value: !Ref DeploymentName
          PropagateAtLaunch: true
    CreationPolicy:
      AutoScalingCreationPolicy:
        MinSuccessfulInstancesPercent: 100
      ResourceSignal:
        Count: !Ref ASGMinSize
        Timeout: PT5M
    UpdatePolicy:
      AutoScalingReplacingUpdate:
        WillReplace: true # Replaces current ASG with another new ASG
    Type: 'AWS::AutoScaling::AutoScalingGroup'

  ###################
  # LaunchTemplate
  ###################

  Ec2LaunchTemplate:
    Metadata:
      AWS::CloudFormation::Init:
        configSets: # configSets allows to segregate between use cases, one for initial start, one for update
          create:
            - 01_check_amazon-ssm-agent
            - 02_download_artifact
            - 03_start_artifact
        01_check_amazon-ssm-agent:
          services:
            sysvinit:
              amazon-ssm-agent:
                enabled: true
                ensureRunning: true
        02_download_artifact:
          commands:
            01_download_artifact_from_code_artifact:
              cwd: "/tmp"
              command: !Sub |
                export ASSET_NAME=$(aws codeartifact list-package-version-assets \
                  		--domain ${ArtifactDomainName} \
                  		--domain-owner ${CiCdAccountId} \
                  		--repository ${RepositoryName} \
                  	    --format maven \
                  	    --namespace com.the.atomicity \
                  	    --package ${ProjectName} \
                  	    --package-version 0.0.1-SNAPSHOT \
                  	    --query 'assets[?ends_with(name, `.jar`)==`true`].name' \
                  	    --output text) && \
                echo ASSET_NAME $ASSET_NAME && \
                aws codeartifact get-package-version-asset \
                  --domain ${ArtifactDomainName} \
                  --domain-owner ${CiCdAccountId} \
                  --repository ${RepositoryName} \
                  --format maven \
                  --namespace com.the.atomicity \
                  --package ${ProjectName} \
                  --package-version 0.0.1-SNAPSHOT \
                  --asset $ASSET_NAME ${ArtifactName}
        03_start_artifact:
          commands:
            00_start_artifact:
              cwd: "/tmp"
              # redirect outputs to give the prompt back
              command: !Sub "java -jar -Dspring.profiles.active=${DeploymentName} ./${ArtifactName} > /tmp/${ProjectName}.log 2>&1 </dev/null & sleep 20"
            01_send_cfn_signal:
              command: !Sub "/opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackId} --resource AutoScalingGroup --region ${AWS::Region}"
    Properties:
      LaunchTemplateName: !Ref ProjectVersion
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt WebappInstanceProfile.Arn
        ImageId: !Ref LatestAmiId
        InstanceType: !FindInMap [ Architectures, !Ref Architecture, InstanceType ]
        SecurityGroupIds:
          - !GetAtt WebappSecurityGroup.GroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            /opt/aws/bin/cfn-init -v --stack ${AWS::StackId} --resource Ec2LaunchTemplate --region ${AWS::Region} --configsets create
    Type: AWS::EC2::LaunchTemplate

  WebappSecurityGroup:
    Properties:
      GroupDescription: Allows access to Webapp from Alb
      # noinspection YamlUnresolvedReferences
      VpcId: !Ref NetworkVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApplicationPort
          ToPort: !Ref ApplicationPort
          # noinspection YamlUnresolvedReferences
          SourceSecurityGroupId: !Ref AlbSecurityGroup
    Type: AWS::EC2::SecurityGroup

  Ec2LaunchTemplateRole:
    Properties:
      Description: Role applied on Instance Profile via launch template.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action: sts:AssumeRole
      Policies:
        - PolicyName: code-deploy-launch-template-policy # TODO: remove
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                  - iam:PassRole
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:PutRetentionPolicy
                Resource: '*'
        - PolicyName: code-artifact-read-only
          PolicyDocument:
            Statement:
              - Sid: CodeArtifactRetrievalUpdated
                Effect: Allow
                Action:
                  - codeartifact:GetAuthorizationToken
                  - codeartifact:GetRepositoryEndpoint
                  - codeartifact:ReadFromRepository
                  - codeartifact:ListPackageVersionAssets
                  - codeartifact:GetPackageVersionAsset
                Resource: "*"
              - Effect: Allow
                Action: sts:GetServiceBearerToken
                Resource: "*"
                Condition:
                  StringEquals:
                    "sts:AWSServiceName": codeartifact.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /
    Type: AWS::IAM::Role

  WebappInstanceProfile:
    Properties:
      Roles:
        - !Ref Ec2LaunchTemplateRole
    Type: AWS::IAM::InstanceProfile

  ###############
  # Cloudfront
  ###############

  CloudfrontDistribution:
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100 # Northern America + Europe + Israel
        Origins:
          - Id: CustomOrigin
            # noinspection YamlUnresolvedReferences
            DomainName: !GetAtt AlbInstance.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
          TargetOriginId: CustomOrigin
          ViewerProtocolPolicy: redirect-to-https
        CacheBehaviors:
          - PathPattern: !Sub "/${DeploymentName}"
            TargetOriginId: CustomOrigin
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed-CachingDisabled See https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-managed-cache-policies.html#managed-cache-policy-caching-disabled
            ViewerProtocolPolicy: redirect-to-https
    Type: AWS::CloudFront::Distribution

  ###############
  # VPC Endpoints
  ###############

  VpcEndPoints:
    Properties:
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PrivateSubnet1: !Ref NetworkPrivateSubnet1
      # noinspection YamlUnresolvedReferences
      PrivateSubnet2: !Ref NetworkPrivateSubnet2
    Type: Atomicity::Vpc::Endpoints::MODULE

Outputs:
  WatchServiceEndpoint:
    Value: !Sub
      - "http://${LbDNSName}/${DeploymentName}"
      - # noinspection YamlUnresolvedReferences
        LbDNSName: !GetAtt AlbInstance.DNSName
  CloudFrontServiceEndpoint:
    Value: !Sub
      - "https://${CloudFrontDomainName}/${DeploymentName}"
      - CloudFrontDomainName: !GetAtt CloudfrontDistribution.DomainName
