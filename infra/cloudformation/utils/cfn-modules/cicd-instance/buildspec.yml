version: 0.2
env:
  parameter-store:
    LATEST_AMI_ID: /custom/ami/al2023/${ARCHITECTURE}
  exported-variables:
    - LATEST_AMI_ID
phases:
  pre_build:
    commands:
      - aws --version && docker --version && java --version && mvn --version
      - export CODEARTIFACT_AUTH_TOKEN=`aws codeartifact get-authorization-token --domain ${ARTIFACT_DOMAIN_NAME} --domain-owner ${AWS_ACCOUNT_ID} --query authorizationToken --output text`
      - envsubst < ${DEPLOYMENT_NAME}/.m2/settings.xml > settings.xml
      - cp settings.xml ~/.m2/settings.xml
  build:
    commands:
      - mvn deploy -PpublishingCodeArtifact -DaltDeploymentRepository=codeartifact::default::${CODEARTIFACT_REPOSITORY_URL}

reports:
  SurefireReports: # CodeBuild will create a report group called "SurefireReports".
    files: #Store all of the files
      - '**/*'
    base-directory: 'target/surefire-reports' # Location of the reports

artifacts:
  files:
    - ${DEPLOYMENT_NAME}/infra.yml
  discard-paths: yes

cache:
  paths:
    - /root/.m2/**/*