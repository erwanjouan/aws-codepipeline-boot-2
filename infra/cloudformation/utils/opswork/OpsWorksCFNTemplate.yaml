    CustomTerminationLambda: 
      Type: AWS::Lambda::Function
      Properties: 
        Code: 
          ZipFile: 
            Fn::Sub: |
              import boto3
              import random
              from botocore.exceptions import ClientError

              def lambda_handler(event,context):
                  instance_ids_to_terminate = [x['InstanceId'] for x in event['Instances']]
                  ec2_client = boto3.client('ec2')
                  instances_to_not_terminate = []
                  default_sample_size = 15
                  sample_size = default_sample_size if len(instance_ids_to_terminate) > default_sample_size else len(instance_ids_to_terminate) 
                  instance_ids_to_terminate = random.sample(instance_ids_to_terminate,sample_size)
                  kwargs = {
                      "Filters": [
                      {
                           'Name':'tag-key',
                           'Values': ['protected_instance']
                      }],
                      "InstanceIds": instance_ids_to_terminate
                  }
                  try:
                      response = ec2_client.describe_instances(
                          **kwargs
                      )['Reservations']            
                  except ClientError as e:
                      raise

                  [instance_ids_to_terminate.remove(i['InstanceId']) for e in response for i in e.get("Instances","")]

                  return {
                      "InstanceIDs": instance_ids_to_terminate
                  }

        Description:
          Fn::Sub:  Custom termination policy as part of ${AWS::StackName} CloudFormation stack. EC2 instances which are deemed for a scale in event will not be terminated if they contain a specific tag. 
        Handler: index.lambda_handler
        Role: 
          Fn::GetAtt: [LambdaFunctionRole, Arn]
        Runtime: python3.9
        Timeout: 120
        MemorySize: 128
        Tags:
          - Key: ComponentName
            Value: 
              Ref: AWS::StackName
    CustomTerminationLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties: 
        Action: lambda:InvokeFunction
        FunctionName:
          Ref: CustomTerminationLambda
        Principal: 
          Fn::Sub: 
            arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/autoscaling.amazonaws.com/${ASGServiceLinkedRole}
      DependsOn: ASGServiceLinkedRole
    ASGServiceLinkedRole:
      Type: AWS::IAM::ServiceLinkedRole
      Properties: 
        AWSServiceName: autoscaling.amazonaws.com
        Description: 
          Fn::Sub: Service-Linked Role for custom termination policy. Part of CloudFormation stack ${AWS::StackName}
        CustomSuffix:
          Fn::Join:
            - "-"
            - - Ref: AWS::Region
              - Fn::Select:
                - 4 
                - Fn::Split:
                  - "-"
                  - Fn::Select:
                    - 2 
                    - Fn::Split:
                      - "/"
                      - Ref: AWS::StackId
    LambdaFunctionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - lambda.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyDocument:
              Version: '2012-10-17'
              Statement:                 
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                  Resource:
                    - Fn::Sub:
                        arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*
                - Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - Fn::Sub:
                        arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
                - Effect: Allow
                  Action:
                    - ec2:DescribeInstances
                    - ec2:DescribeTags
                  Resource: '*'
            PolicyName: lambdafunctionexecutionrole
        Tags:
          - Key: ComponentName
            Value: 
              Ref: AWS::StackName

