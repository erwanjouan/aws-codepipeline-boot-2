      Type: AWS::ResourceGroups::Group
      Properties:
        Description: Resource group for all resources deployed by CFN stack.
        Name:
          Ref: AWS::StackName
        ResourceQuery:
          Query:
            TagFilters:
              - Key: ComponentName
                Values:
                  - Ref: AWS::StackName
          Type: TAG_FILTERS_1_0
        Tags:
          - 'Fn::If':
              - IsApplicationNameProvided
              - Key: ApplicationName
                Value:
                  Ref: ApplicationName
              - Ref: AWS::NoValue
