AWSTemplateFormatVersion: 2010-09-09
Description: A Java SpringBoot application deployed on EC2/ASG with rolling update (update policy)
Parameters:
  ProjectDeploymentName:
    Type: String
  DeploymentName:
    Type: String
  ApplicationPort:
    Type: String
    Default: 8080
  AlbPort:
    Type: String
    Default: 80
  ASGMinSize:
    Type: Number
    Default: 2
  ASGMaxSize:
    Type: Number
    Default: 4
  ProjectVersion:
    Type: String
  ArtifactName:
    Type: String
  ArtifactDomainName:
    Type: String
  RepositoryName:
    Type: String
  ProjectName:
    Type: String
  AlbAccessLogsEnabled:
    Type: String
    Default: false
  LatestAmiId:
    Type: String
  Architecture:
    Type: String
  CiCdAccountId:
    Type: String

Mappings:
  Architectures:
    x86:
      InstanceType: t2.small
    arm64:
      InstanceType: t4g.small

Resources:

  Network:
    Type: Atomicity::Vpc::Internet::MODULE

  ##########################
  # ALB
  ##########################

  Alb:
    Properties:
      ApplicationPort: !Ref ApplicationPort
      AlbPort: !Ref AlbPort
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PublicSubnet1: !Ref NetworkPublicSubnet1
      # noinspection YamlUnresolvedReferences
      PublicSubnet2: !Ref NetworkPublicSubnet2
      HealthCheckPath: /actuator/health
      AccessLogsEnabled: !Ref AlbAccessLogsEnabled
      ProjectDeploymentName: !Ref ProjectDeploymentName
    # noinspection YamlUnresolvedReferences
    DependsOn: NetworkGatewayToInternet
    Type: Atomicity::Alb::Resources::MODULE

  ###################
  # AutoScalingGroup
  ###################

  AutoScalingGroup:
    Properties:
      AutoScalingGroupName: !Ref ProjectDeploymentName
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      MinSize:
        Ref: ASGMinSize
      MaxSize:
        Ref: ASGMaxSize
      LaunchTemplate:
        LaunchTemplateId: !Ref Ec2LaunchTemplate
        Version: !GetAtt Ec2LaunchTemplate.LatestVersionNumber
      # noinspection YamlUnresolvedReferences
      VPCZoneIdentifier: [ !Ref NetworkPrivateSubnet1, !Ref NetworkPrivateSubnet2 ]
      TargetGroupARNs:
        - # noinspection YamlUnresolvedReferences
          Ref: AlbTargetGroup
      Tags:
        - Key: ProjectDeploymentName
          Value: !Ref ProjectDeploymentName
          PropagateAtLaunch: true
        - Key: Name
          Value: !Ref DeploymentName
          PropagateAtLaunch: true
    # By default, when LaunchTemplate changes, instances are not updated
    UpdatePolicy:
      AutoScalingReplacingUpdate:
        WillReplace: false # Replaces instances inside the same ASG
      AutoScalingRollingUpdate:
        MaxBatchSize: 2 # Specifies the maximum number of instances that CloudFormation updates.
        MinInstancesInService: 2 # must be less than Asg MaxSize
        WaitOnResourceSignals: true # Specifies whether the Cloudformation waits on signals from new instances during an update.
        SuspendProcesses:
          - HealthCheck
          - ReplaceUnhealthy
          - AZRebalance
          - AlarmNotification
          - ScheduledActions
    Type: AWS::AutoScaling::AutoScalingGroup

  ###################
  # LaunchTemplate
  ###################

  Ec2LaunchTemplate:
    Properties:
      LaunchTemplateName: !Ref ProjectVersion
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt WebappInstanceProfile.Arn
        ImageId: !Ref LatestAmiId
        InstanceType: !FindInMap [ Architectures, !Ref Architecture, InstanceType ]
        SecurityGroupIds:
          - !GetAtt WebappSecurityGroup.GroupId
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash
              #
              # Retrieve artifact from CodeArtifact
              #
              cd /tmp
              ASSET_NAME=$(aws codeartifact list-package-version-assets \
                          --domain ${ArtifactDomainName} \
                          --domain-owner ${CiCdAccountId} \
                          --repository ${RepositoryName} \
                          --format maven \
                          --namespace com.the.atomicity \
                          --package ${ProjectName} \
                          --package-version 0.0.1-SNAPSHOT \
                          --query 'assets[?ends_with(name, `.jar`)==`true`].name' \
                          --output text) && \
              aws codeartifact get-package-version-asset \
                    --domain ${ArtifactDomainName} \
                    --domain-owner ${CiCdAccountId} \
                    --repository ${RepositoryName} \
                    --format maven \
                    --namespace com.the.atomicity \
                    --package ${ProjectName} \
                    --package-version 0.0.1-SNAPSHOT \
                    --asset $ASSET_NAME ${ArtifactName}
              #
              # Start application in background and wait
              #
              java -jar -Dspring.profiles.active=${DeploymentName} ./${ArtifactName} >/dev/null 2>&1 </dev/null & sleep 20
              #
              # Complete lifecycle action
              #
              TOKEN=$(curl --request PUT "http://instance-data/latest/api/token" --header "X-aws-ec2-metadata-token-ttl-seconds: 3600")
              INSTANCE_ID=$(curl -s http://instance-data/latest/meta-data/instance-id --header "X-aws-ec2-metadata-token: $TOKEN")
              aws autoscaling complete-lifecycle-action --lifecycle-action-result CONTINUE --instance-id $INSTANCE_ID --lifecycle-hook-name "${lifecycleHookName}" --auto-scaling-group-name "${autoScalingGroupName}"  --region ${AWS::Region}  || \
              aws autoscaling complete-lifecycle-action --lifecycle-action-result ABANDON --instance-id $INSTANCE_ID --lifecycle-hook-name "${lifecycleHookName}" --auto-scaling-group-name "${autoScalingGroupName}"  --region ${AWS::Region}
              #
              # Signal back to CloudFormation
              #
              /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackId} --resource AutoScalingGroup --region ${AWS::Region}
            - lifecycleHookName: !Ref ProjectDeploymentName
              autoScalingGroupName: !Ref ProjectDeploymentName
    Type: AWS::EC2::LaunchTemplate

  LifecycleHook:
    Properties:
      LifecycleHookName: !Ref ProjectDeploymentName
      AutoScalingGroupName: !Ref AutoScalingGroup
      DefaultResult: ABANDON
      HeartbeatTimeout: 900
      LifecycleTransition: "autoscaling:EC2_INSTANCE_LAUNCHING"
    Type: AWS::AutoScaling::LifecycleHook

  WebappSecurityGroup:
    Properties:
      GroupDescription: Allows access to Webapp from Alb
      # noinspection YamlUnresolvedReferences
      VpcId: !Ref NetworkVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApplicationPort
          ToPort: !Ref ApplicationPort
          # noinspection YamlUnresolvedReferences
          SourceSecurityGroupId: !Ref AlbSecurityGroup
    Type: AWS::EC2::SecurityGroup

  Ec2LaunchTemplateRole:
    Properties:
      Description: Role applied on Instance Profile via launch template.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action: sts:AssumeRole
      Policies:
        - PolicyName: code-deploy-launch-template-policy # TODO: remove
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                  - iam:PassRole
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:PutRetentionPolicy
                Resource: '*'
        - PolicyName: CompleteLifecycleActionAllowPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: autoscaling:CompleteLifecycleAction
                Resource: !Sub "arn:aws:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/${ProjectDeploymentName}"
        - PolicyName: code-artifact-read-only
          PolicyDocument:
            Statement:
              - Sid: CodeArtifactRetrievalUpdated
                Effect: Allow
                Action:
                  - codeartifact:GetAuthorizationToken
                  - codeartifact:GetRepositoryEndpoint
                  - codeartifact:ReadFromRepository
                  - codeartifact:ListPackageVersionAssets
                  - codeartifact:GetPackageVersionAsset
                Resource: "*"
              - Effect: Allow
                Action: sts:GetServiceBearerToken
                Resource: "*"
                Condition:
                  StringEquals:
                    "sts:AWSServiceName": codeartifact.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /
    Type: AWS::IAM::Role

  WebappInstanceProfile:
    Properties:
      Roles:
        - !Ref Ec2LaunchTemplateRole
    Type: AWS::IAM::InstanceProfile

  Events:
    Properties:
      ProjectDeploymentName: !Ref ProjectDeploymentName
    Type: Atomicity::Events::Listener::MODULE

  ###############
  # VPC Endpoints
  ###############

  VpcEndPoints:
    Properties:
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PrivateSubnet1: !Ref NetworkPrivateSubnet1
      # noinspection YamlUnresolvedReferences
      PrivateSubnet2: !Ref NetworkPrivateSubnet2
    Type: Atomicity::Vpc::Endpoints::MODULE

Outputs:
  WatchServiceEndpoint:
    Value: !Sub
      - "http://${LbDNSName}/${DeploymentName}"
      - # noinspection YamlUnresolvedReferences
        LbDNSName: !GetAtt AlbInstance.DNSName