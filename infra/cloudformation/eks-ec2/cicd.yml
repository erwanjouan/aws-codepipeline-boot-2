AWSTemplateFormatVersion: 2010-09-09
Description: CICD For a Java SpringBoot application deployed with EKS ec2
Parameters:
  ProjectName:
    Type: String
  DeploymentName:
    Type: String
  ProjectDeploymentName:
    Type: String
  BranchName:
    Type: String
    Default: main

Resources:

  ####################
  # S3 Artifact bucket
  ####################

  ArtifactOutputBucket:
    Type: AWS::S3::Bucket

  ########
  # ECR
  ########

  ContainerImageRepository:
    # ECR registry
    Properties:
      RepositoryName: !Ref ProjectDeploymentName
    Type: AWS::ECR::Repository

  CustomResourceImageRegistry:
    Type: AWS::ECR::Repository

  ############
  # CodeBuild
  ############

  CodeBuildServiceRole:
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: codebuild.amazonaws.com
          Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: allow-to-push-to-S3
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:List*
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactOutputBucket}"
                  - !Sub "arn:aws:s3:::${ArtifactOutputBucket}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:GetLogEvents
                  - logs:PutLogEvents
                  - logs:PutRetentionPolicy
                Resource: "arn:aws:logs:*"
              - Effect: Allow
                Action: codecommit:GitPull
                Resource: '*'
              - Effect: Allow
                Resource: '*'
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:GetAuthorizationToken
              - Effect: Allow
                Action: cloudformation:CreateStack
                Resource: '*'
    Type: AWS::IAM::Role

  CodeBuildJavaProject:
    Properties:
      Name: !Ref ProjectDeploymentName
      ServiceRole: !Ref CodeBuildServiceRole
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Sub '${DeploymentName}/buildspec.yml'
      SourceVersion: main
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:6.0
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Type: PLAINTEXT
            Value: !Ref AWS::Region
          - Name: PROJECT_NAME
            Type: PLAINTEXT
            Value: !Ref ProjectName
          - Name: PROJECT_DEPLOYMENT_NAME
            Type: PLAINTEXT
            Value: !Ref ProjectDeploymentName
          - Name: DEPLOYMENT_NAME
            Type: PLAINTEXT
            Value: !Ref DeploymentName
          - Name: AWS_ACCOUNT_ID
            Type: PLAINTEXT
            Value: !Ref AWS::AccountId
          - Name: ARTIFACT_BUCKET
            Type: PLAINTEXT
            Value: !Ref ArtifactOutputBucket
          - Name: CUSTOM_RESOURCE_IMAGE_REGISTRY
            Type: PLAINTEXT
            Value: !Ref CustomResourceImageRegistry
      Cache:
        Location: !Sub '${ArtifactOutputBucket}/cache'
        Type: S3
    Type: AWS::CodeBuild::Project

  ###############
  # CodePipeline
  ###############

  CodePipelineRole:
    # Role for CodePipeline
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - codepipeline.amazonaws.com
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AWSCodePipeline_FullAccess'
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonS3FullAccess'
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess'
      Path: /
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: "*"
                Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - iam:PassRole
              - Resource: "*"
                Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:CreateDeploymentGroup
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
              - Resource: "*"
                Effect: Allow
                Action:
                  - codecommit:*
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                Resource: '*'
      RoleName: !Sub 'code-pipeline-role-${ProjectDeploymentName}'
    Type: AWS::IAM::Role

  BuildProjectPipeline:
    # Creating a build pipeline for your project in AWS CodePipeline
    Properties:
      Name: !Sub ${ProjectDeploymentName}-build
      RoleArn: !GetAtt 'CodePipelineRole.Arn'
      RestartExecutionOnUpdate: False
      ArtifactStore:
        Location: !Ref ArtifactOutputBucket
        Type: S3
      Stages:
        - Name: SourceStage
          Actions:
            - Name: CodeCommit
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: 1
              OutputArtifacts:
                - Name: source
              Configuration:
                BranchName: !Ref BranchName
                RepositoryName: !Ref ProjectName
                PollForSourceChanges: false
                OutputArtifactFormat: CODEBUILD_CLONE_REF
              Namespace: GitVariables
        - Name: BuildStage
          Actions:
            - Name: CodeBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref CodeBuildJavaProject
              InputArtifacts:
                - Name: source
              OutputArtifacts:
                - Name: infra
        - Name: DeployStage
          Actions:
            - Name: Cloudformation
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: 1
              InputArtifacts:
                - Name: infra
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub '${ProjectDeploymentName}-deploy'
                Capabilities: CAPABILITY_IAM,CAPABILITY_NAMED_IAM
                RoleArn: !Sub 'arn:aws:iam::${AWS::AccountId}:role/CloudformationRole'
                TemplatePath: "infra::infra.yml"
                ParameterOverrides: !Sub |
                  {
                    "ProjectDeploymentName": "${ProjectDeploymentName}",
                    "DeploymentName": "${DeploymentName}",
                    "ProjectVersion": "#{GitVariables.CommitId}",
                    "EcrLambdaRegistry": "${CustomResourceImageRegistry}",
                    "ArtifactBucket": "${ArtifactOutputBucket}"
                  }
              RunOrder: 1
    Type: AWS::CodePipeline::Pipeline


  #####################################
  # Starts the pipeline at each commit
  #####################################

  CommitEventRole:
    # Role for CommitEventRule
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: "*"
                Effect: Allow
                Action:
                  - codepipeline:StartPipelineExecution
    Type: AWS::IAM::Role

  CommitEventRule:
    Properties:
      EventPattern:
        source:
          - "aws.codecommit"
        detail-type:
          - "CodeCommit Repository State Change"
        detail:
          event:
            - "referenceUpdated"
          referenceName:
            - !Ref BranchName
      Targets:
        - Arn: !Sub
            - 'arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${BuildPipeline}'
            - BuildPipeline: !Ref BuildProjectPipeline
          Id: !Ref BuildProjectPipeline
          RoleArn: !GetAtt 'CommitEventRole.Arn'
    Type: AWS::Events::Rule

  ##########
  # Cleanup
  ##########

  CleanupLambda:
    Properties:
      Handler: index.lambda_handler
      Timeout: 60
      Role: !GetAtt 'CustomResourceExecutionRole.Arn'
      Runtime: python3.9
      Environment:
        Variables:
          CONTAINER_IMAGE_REPOSITORY: !Ref ContainerImageRepository
          CUSTOM_RESOURCE_IMAGE_REGISTRY: !Ref CustomResourceImageRegistry
          BUCKET_NAME: !Ref ArtifactOutputBucket
      Code:
        ZipFile: |
          import logging
          import string
          import boto3
          import cfnresponse
          import traceback
          import os

          ecr = boto3.client('ecr')
          s3 = boto3.resource('s3')
          containerImageRegistry = os.getenv('CONTAINER_IMAGE_REPOSITORY')
          customResourceImageRegistry = os.getenv('CUSTOM_RESOURCE_IMAGE_REGISTRY')
          bucketName = os.getenv('BUCKET_NAME')
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def lambda_handler(event, context):
            try:
              logger.info('got event {}'.format(event))
              responseData = {}
              if event['RequestType'] is not None and event['RequestType'] in ['Delete']:
                # cleaning image registries
                for registry in [containerImageRegistry, customResourceImageRegistry]:
                  image_ids = ecr.list_images(repositoryName=registry)['imageIds']
                  if len(image_ids) > 0:
                    response = ecr.batch_delete_image(repositoryName=registry, imageIds=image_ids)
                    logger.info('{}'.format(response))
                # clear bucket
                bucket = s3.Bucket(bucketName)
                bucket.objects.all().delete()
              cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, 'CustomResourcePhysicalID')
            except Exception:
              # Sending FAILED signal to CloudFormation
              logger.info('Exception {}'.format(traceback.format_exc()))
              cfnresponse.send(event, context, cfnresponse.FAILED, responseData, 'CustomResourcePhysicalID')
    Type: AWS::Lambda::Function

  CustomResourceExecutionRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
            Condition: { }
      Path: /
      Policies:
        - PolicyName: lambda-s3-full-access
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action: s3:* # should more least priviledged
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactOutputBucket}"
                  - !Sub "arn:aws:s3:::${ArtifactOutputBucket}/*"
        - PolicyName: lambda-ecr-full-access
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action: ecr:* # should more least priviledged
                Resource: "*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
    Type: AWS::IAM::Role

  CustomResourceCleanup:
    Properties:
      ServiceToken: !GetAtt 'CleanupLambda.Arn'
    DependsOn:
      - ArtifactOutputBucket
      - ContainerImageRepository
    Type: Custom::CleanupLambda

Outputs:
  ArtifactOutputBucket:
    Value: !GetAtt ArtifactOutputBucket.RegionalDomainName
