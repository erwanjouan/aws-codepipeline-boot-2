AWSTemplateFormatVersion: 2010-09-09
Description: A Java SpringBoot application deployed with EC2
Parameters:
  ProjectDeploymentName:
    Type: String
  DeploymentName:
    Type: String
  ApplicationPort:
    Type: String
    Default: 8080
  AlbPort:
    Type: String
    Default: 80
  ASGMinSize:
    Type: Number
    Default: 2
  ASGMaxSize:
    Type: Number
    Default: 4
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /custom/ami/al2023.11
  InstanceType:
    Type: String
    Default: t3.medium
  DeploymentConfigName:
    Type: String
    Default: CodeDeployDefault.AllAtOnce
    AllowedValues:
      - CodeDeployDefault.AllAtOnce # Attempts to deploy an application revision to as many instances as possible at once. The status of the overall deployment is displayed as Succeeded if the application revision is deployed to one or more of the instances. The status of the overall deployment is displayed as Failed if the application revision is not deployed to any of the instances. Using an example of nine instances, CodeDeployDefault.AllAtOnce attempts to deploy to all nine instances at once. The overall deployment succeeds if deployment to even a single instance is successful. It fails only if deployments to all nine instances fail.
      - CodeDeployDefault.HalfAtATime # In-place deployments: Deploys to up to half of the instances at a time (with fractions rounded down). The overall deployment succeeds if the application revision is deployed to at least half of the instances (with fractions rounded up). Otherwise, the deployment fails. In the example of nine instances, it deploys to up to four instances at a time. The overall deployment succeeds if deployment to five or more instances succeed. Otherwise, the deployment fails.
      - CodeDeployDefault.OneAtATime # Deploys the application revision to only one instance at a time.
  ProjectVersion:
    Type: String
  ArtifactOutputBucket:
    Type: String
  AlbAccessLogsEnabled:
    Type: String
    Default: false
    
Resources:

  Network:
    Type: Atomicity::Vpc::Internet::MODULE

  ##########################
  # ALB
  ##########################

  Alb:
    Properties:
      ApplicationPort: !Ref ApplicationPort
      AlbPort: !Ref AlbPort
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PublicSubnet1: !Ref NetworkPublicSubnet1
      # noinspection YamlUnresolvedReferences
      PublicSubnet2: !Ref NetworkPublicSubnet2
      HealthCheckPath: /actuator/health
      AccessLogsEnabled: !Ref AlbAccessLogsEnabled
      ProjectDeploymentName: !Ref ProjectDeploymentName
    # noinspection YamlUnresolvedReferences
    DependsOn: NetworkGatewayToInternet
    Type: Atomicity::Alb::Resources::MODULE

  ###################
  # AutoScalingGroup
  ###################

  AutoScalingGroup:
    Properties:
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      MinSize:
        Ref: ASGMinSize
      MaxSize:
        Ref: ASGMaxSize
      MixedInstancesPolicy:
        InstancesDistribution:
          OnDemandAllocationStrategy: prioritized
          OnDemandBaseCapacity: 0
          OnDemandPercentageAboveBaseCapacity: 0
          SpotAllocationStrategy: price-capacity-optimized
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref Ec2LaunchTemplate
            Version: !GetAtt Ec2LaunchTemplate.LatestVersionNumber
      # noinspection YamlUnresolvedReferences
      VPCZoneIdentifier: [ !Ref NetworkPrivateSubnet1, !Ref NetworkPrivateSubnet2 ]
      TargetGroupARNs:
        - # noinspection YamlUnresolvedReferences
          Ref: AlbTargetGroup
      Tags:
        - Key: ProjectDeploymentName
          Value: !Ref ProjectDeploymentName
          PropagateAtLaunch: true
    Type: AWS::AutoScaling::AutoScalingGroup

  Ec2LaunchTemplate:
    Properties:
      LaunchTemplateName: !Ref ProjectDeploymentName
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt WebappInstanceProfile.Arn
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        SecurityGroupIds:
          - !GetAtt WebappSecurityGroup.GroupId
    Type: AWS::EC2::LaunchTemplate

  WebappSecurityGroup:
    Properties:
      GroupDescription: allow access to Webapp from Alb
      # noinspection YamlUnresolvedReferences
      VpcId: !Ref NetworkVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApplicationPort
          ToPort: !Ref ApplicationPort
          # noinspection YamlUnresolvedReferences
          SourceSecurityGroupId: !Ref AlbSecurityGroup
    Type: AWS::EC2::SecurityGroup

  Ec2CodeDeployRole:
    Properties:
      Description: Role applied on Instance Profile via launch template. Provides full access to CodeDeploy resources.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action: sts:AssumeRole
      Policies:
        - PolicyName: code-deploy-launch-template-policy
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                  - iam:PassRole
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:PutRetentionPolicy
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployFullAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /
    Type: AWS::IAM::Role

  WebappInstanceProfile:
    Properties:
      Roles:
        - !Ref Ec2CodeDeployRole
    Type: AWS::IAM::InstanceProfile

  ScalingPolicy:
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: '50'
    Type: AWS::AutoScaling::ScalingPolicy

  ###############
  # CodeDeploy
  ###############

  # https://docs.aws.amazon.com/codedeploy/latest/userguide/getting-started-create-service-role.html

  CodeDeployer:
    Properties:
      Description: Provides CodeDeploy service access to expand tags and interact with Auto Scaling on your behalf.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Principal:
            Service: codedeploy.amazonaws.com
          Action: sts:AssumeRole
      Policies:
        - PolicyName: code-deploy-launch-template-policy
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                  - iam:PassRole
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole
      Path: /
    Type: AWS::IAM::Role

  CodeDeployApplication:
    Properties:
      ApplicationName: !Ref ProjectDeploymentName
      ComputePlatform: Server
    Type: AWS::CodeDeploy::Application

  CodeDeployDeploymentGroup:
    Properties:
      ApplicationName: !Ref ProjectDeploymentName
      ServiceRoleArn: !GetAtt CodeDeployer.Arn
      DeploymentConfigName: !Ref DeploymentConfigName
      DeploymentGroupName: !Ref ProjectDeploymentName
      AutoScalingGroups: # A list of associated Auto Scaling groups that CodeDeploy automatically deploys revisions to when new instances are created.
        - !Ref AutoScalingGroup
      DeploymentStyle:
        DeploymentType: IN_PLACE
        DeploymentOption: WITHOUT_TRAFFIC_CONTROL
      Ec2TagSet: # allows to decouple from deployed infrastructure
        Ec2TagSetList:
          - Ec2TagGroup:
              - Type: KEY_AND_VALUE
                Key: ProjectDeploymentName
                Value: !Ref ProjectDeploymentName
      AlarmConfiguration:
        Alarms:
          - Name: !Ref CodeDeployAlarm
        Enabled: True
        IgnorePollAlarmFailure: False
      Deployment: # This triggers a new deployment each time ProjectVersion changes
        IgnoreApplicationStopFailures: False
        Revision:
          RevisionType: S3
          S3Location:
            Bucket: !Ref ArtifactOutputBucket
            BundleType: zip
            Key: !Sub "${ProjectVersion}/codeDeployAppRevision.zip"
    Type: AWS::CodeDeploy::DeploymentGroup

  CodeDeployAlarm:
    Properties:
      AlarmDescription: Cpu Alarm on auto scaling group
      AlarmName: !Sub '${ProjectDeploymentName}-cpu'
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      EvaluationPeriods: 1
      Period: '300'
      Statistic: Maximum
      ComparisonOperator: GreaterThanThreshold
      Threshold: '70'
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup
    Type: AWS::CloudWatch::Alarm

  ###############
  # VPC Endpoints
  ###############

  VpcEndPoints:
    Properties:
      # noinspection YamlUnresolvedReferences
      VPC: !Ref NetworkVPC
      # noinspection YamlUnresolvedReferences
      PrivateSubnet1: !Ref NetworkPrivateSubnet1
      # noinspection YamlUnresolvedReferences
      PrivateSubnet2: !Ref NetworkPrivateSubnet2
    Type: Atomicity::Vpc::Endpoints::MODULE

Outputs:
  WatchServiceEndpoint:
    Value: !Sub
      - "http://${LbDNSName}/${DeploymentName}"
      - # noinspection YamlUnresolvedReferences
        LbDNSName: !GetAtt AlbInstance.DNSName