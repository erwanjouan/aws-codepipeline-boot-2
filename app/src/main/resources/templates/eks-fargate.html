<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta http-equiv="refresh" content="3">

    <title>Blue Green App</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <!-- bootstrap -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}"/>
    <script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.min.js}"></script>

    <!-- jquery -->
    <script th:src="@{/webjars/jquery/3.4.1/jquery.min.js}"></script>

    <!-- jquery datatable-->
    <link rel="stylesheet" th:href="@{/webjars/datatables/1.10.19/css/jquery.dataTables.min.css}"/>
    <script th:src="@{/webjars/datatables/1.10.19/js/jquery.dataTables.min.js}"></script>

</head>

<body>

<div class="container-fluid p-5 text-center">
    <h4>EKS Fargate</h4>
</div>

<div class="container ml-1">

    <!-- From instance-->
    <div class="mt-2">
        <h5>From Pod</h5>
        <span>
            <b>HostName=</b>[[${eksControlDto.podName}]]<br/>
            <b>Cpu = </b>[[${eksControlDto.cpu}]] %
        </span>
    </div>

    <!-- Deployed instance-->
    <div class="mt-5">
        <h5>Deployed Pods</h5>
        <table id="sample" class="table table-bordered table-hover table-striped">
            <thead>
            <tr class="headings">
                <th th:each="header: ${eksControlDto.controlTable.headers}" class="column-title"
                    th:text="${header}" th:style="|background: ${color}|"/>
            </tr>
            </thead>
            <tbody>
            <tr class="even pointer" th:each="row: ${eksControlDto.controlTable.rows}" id="tablerow">
                <td th:each="header: ${eksControlDto.controlTable.headers}" th:text="${row.get(header)}"/>
            </tr>
            </tbody>
        </table>
        <div/>
    </div>
</div>
</body>
</html>
