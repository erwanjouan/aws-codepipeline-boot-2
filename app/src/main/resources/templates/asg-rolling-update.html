<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title>ASG Rolling Update</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}"/>
    <script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.min.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    <style>
        #diagram-container svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="container-fluid p-4">

    <h4>ASG of EC2s behind ALB <small class="text-muted fw-light">rolling update</small></h4>

    <p class="small mb-3">
        Serving instance: <code id="instance-id" th:text="${ec2ControlDto.instanceInfo.getInstanceId}">…</code>
    </p>

    <div id="diagram-container" class="p-3 rounded bg-dark-subtle text-center"></div>

    <div class="mt-4">
        <h6 class="text-muted">Recent scaling activities</h6>
        <ul id="events-list" class="list-unstyled small font-monospace mb-0">
            <li th:each="event : ${ec2ControlDto.events}" th:text="${event}"></li>
        </ul>
    </div>

</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    let svgCounter = 0;

    function buildDiagram(instances) {
        const lines = [
            'graph LR',
            '    User(["🌐 User"])',
            '    ALB["🔀 ALB<br/>:80"]',
            '    TG["⚖️ Target Group<br/>:8080  /actuator/health"]',
            '    User -->|"HTTP :80"| ALB',
            '    ALB --> TG',
        ];
        const styleLines = [];
        let edgeIndex = 2;

        instances.forEach(function(inst) {
            const id = String(inst.id || '');
            const shortId = id.substring(0, 10) + '…';
            const state = String(inst.instanceState || '');
            const lifecycle = String(inst.asgLifeCycle || '');
            const elbHc = String(inst.elbHc || '');
            const launchTime = String(inst.launchTime || '').substring(0, 19).replace('T', ' ');
            const nodeId = 'I' + id.replace(/-/g, '');
            const label = '🖥️ EC2 instance<br/>'
                + 'id: ' + shortId + '<br/>'
                + 'state: ' + state + ', lifecycle: ' + lifecycle + '<br/>'
                + 'elb: ' + elbHc + ', launched: ' + launchTime;

            if (inst.isCurrent) {
                lines.push('    TG ==>|"this request"| ' + nodeId + '["' + label + '"]');
                styleLines.push('    style ' + nodeId + ' fill:#ff9900,stroke:#e07000,color:#000,font-weight:bold');
                styleLines.push('    linkStyle ' + edgeIndex + ' stroke:#ff9900,stroke-width:3px');
            } else {
                lines.push('    TG --> ' + nodeId + '["' + label + '"]');
            }
            edgeIndex++;
        });

        lines.push.apply(lines, styleLines);
        return lines.join('\n');
    }

    async function renderDiagram(instances) {
        const container = document.getElementById('diagram-container');
        const id = 'svg-' + (++svgCounter);
        const { svg } = await mermaid.render(id, buildDiagram(instances));
        container.innerHTML = svg;
    }

    async function refreshData() {
        try {
            const resp = await fetch('/asg-rolling-update/data');
            const data = await resp.json();
            document.getElementById('instance-id').textContent = data.instanceId;
            await renderDiagram(data.instances);
            const eventsList = document.getElementById('events-list');
            eventsList.innerHTML = (data.events || []).map(function(e) {
                return '<li>' + e.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</li>';
            }).join('');
        } catch (e) {
            console.error('refresh failed', e);
        }
    }

    function scheduleRefresh() {
        refreshData().then(function() { setTimeout(scheduleRefresh, 3000); });
    }

    // Initial render from server-side Thymeleaf data (instant, no extra round-trip)
    const initialRows = /*[[${ec2ControlDto.controlTable.rows}]]*/ [];
    const initialInstances = initialRows.map(function(row) {
        return {
            isCurrent: row['#'] === 'X',
            id: String(row['Id'] || ''),
            launchTime: String(row['LaunchTime'] || ''),
            instanceState: String(row['InstanceState'] || ''),
            asgLifeCycle: String(row['AsgLifeCycle'] || ''),
            elbHc: String(row['ElbHc'] || '')
        };
    });
    renderDiagram(initialInstances).then(function() { setTimeout(scheduleRefresh, 3000); });
    /*]]>*/
</script>

</body>
</html>
